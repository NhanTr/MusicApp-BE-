version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: musicapp-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-SoundCloudDB}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - .src/main/java/nhantr/mussicapp/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-SoundCloudDB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - musicapp-network

  redis:
    image: redis:7-alpine
    container_name: musicapp-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - musicapp-network

  # app:
  #   build: .
  #   container_name: musicapp-app
  #   ports:
  #     - "${APP_PORT:-8080}:8080"
  #   environment:
  #     SPRING_PROFILES_ACTIVE: prod
  #     DB_HOST: postgres
  #     DB_NAME: ${DB_NAME:-SoundCloudDB}
  #     DB_USERNAME: app_user
  #     DB_PASSWORD: app_user_1412
