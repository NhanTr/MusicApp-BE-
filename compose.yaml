version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: musicapp-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:musicapp_db}
      POSTGRES_USER: ${DB_USERNAME:musicapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:musicapp123}
    ports:
      - "${DB_PORT:5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:musicapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - musicapp-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: musicapp-redis
    ports:
      - "${REDIS_PORT:6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:redis123}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - musicapp-network

  # Music App Backend
  musicapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: musicapp-backend
    ports:
      - "${APP_PORT:8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:musicapp_db}
      DB_DRIVER: org.postgresql.Driver
      DB_USERNAME: ${DB_USERNAME:musicapp}
      DB_PASSWORD: ${DB_PASSWORD:musicapp123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:redis123}
      JWT_SECRET: ${JWT_SECRET:your-secret-key-must-be-at-least-32-characters-long}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:3600000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - musicapp-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  musicapp-network:
    driver: bridge
