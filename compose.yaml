  #     REDIS_PORT: 6379
  #     REDIS_PASSWORD: redis123
  #     JWT_SECRET: ${JWT_SECRET:-change-this-in-production-at-least-32-characters}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - musicapp-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  musicapp-network:
    driver: bridge