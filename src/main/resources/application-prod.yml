spring:
  application:
    name: musicapp
  datasource:
    url: jdbc:postgresql://localhost:5432/musicapp_db
    driver-class-name: org.postgresql.Driver
    username: musicapp
    password: musicapp123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      "[hibernate.format_sql]": false
      "[hibernate.dialect]": org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123
      timeout: 5000
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-32-characters-long}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
