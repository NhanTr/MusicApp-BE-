spring:
  datasource:
    url: jdbc:h2:mem:musicappdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      "[hibernate.format_sql]": true
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: musicapp-super-secret-key-must-be-at-least-32-bytes
  expiration-ms: 3600000
