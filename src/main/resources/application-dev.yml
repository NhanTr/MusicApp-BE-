spring:
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:SoundCloudDB}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    username: ${DB_USERNAME:app_user}
    password: ${DB_PASSWORD:app_user_1412}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      "[hibernate.format_sql]": true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}

jwt:
  secret: musicapp-super-secret-key-must-be-at-least-32-bytes
  expiration-ms: 900000
  refresh-expiration-ms: 604800000
